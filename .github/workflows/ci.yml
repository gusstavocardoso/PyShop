name: CI - Testes PyShop

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps chromium

      - name: Run Unit and Integration Tests
        run: |
          pytest tests/unit/ tests/integration/ -v

      - name: Start Docker Containers for E2E
        run: |
          docker compose up -d
          # Aguarda os containers iniciarem (frontend e backend)
          sleep 10
          # Aguarda o backend reportar healthy
          curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:8000/api/products || true
          # Aguarda o frontend responder
          curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:3000 || true

      - name: Run E2E Tests
        run: |
          # Sem --headed no CI (headless)
          pytest tests/e2e/ -v

      - name: Stop Docker Containers
        if: always()
        run: |
          docker compose down

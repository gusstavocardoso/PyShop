name: CI - Testes PyShop

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps chromium

      - name: Run Unit and Integration Tests
        if: always()
        run: |
          pytest tests/unit/ tests/integration/ -v --alluredir=allure-results

      - name: Start Docker Containers for E2E
        if: always()
        run: |
          docker compose up -d
          # Aguarda os containers iniciarem (frontend e backend)
          sleep 10
          # Aguarda o backend reportar healthy
          curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:8000/api/products || true
          # Aguarda o frontend responder
          curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:3000 || true

      - name: Run E2E Tests
        if: always()
        run: |
          # Sem --headed no CI (headless)
          pytest tests/e2e/ -v --alluredir=allure-results

      - name: Stop Docker Containers
        if: always()
        run: |
          docker compose down

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-history

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()
